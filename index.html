<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Mumin Messenger – Simple Edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', 'Hind Siliguri', sans-serif; background: #eae6df; height: 100vh; display: flex; color: #3b3b3b; }

/* AUTH SECTION */
.auth { position: fixed; inset: 0; background: linear-gradient(135deg, #00a884, #075e54); display: flex; justify-content: center; align-items: center; z-index: 1000; }
.auth-box { background: #fff; width: 90%; max-width: 400px; padding: 35px 25px; border-radius: 16px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
.auth-box h2 { color: #075e54; margin-bottom: 20px; font-weight: 600; }
.auth-box input { width: 100%; padding: 12px 15px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; outline: none; }
.auth-box input:focus { border-color: #00a884; }
.auth-box button { width: 100%; padding: 12px; background: #00a884; color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
.auth-toggle { cursor: pointer; color: #075e54; font-size: 14px; margin-top: 15px; font-weight: 500; }

/* MAIN APP SECTION */
.app { display: none; width: 100%; height: 100vh; }
.sidebar { width: 350px; background: #fff; border-right: 1px solid #e3e3e3; display: flex; flex-direction: column; }
.sidebar-header { padding: 15px 20px; background: #f0f2f5; font-weight: 600; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e3e3e3; }
.logout-btn { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 500; }

/* Search Box Only */
.search-box { padding: 12px; background: #fff; border-bottom: 1px solid #f0f2f5; }
.search-row { display: flex; gap: 8px; }
.search-row input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid #e3e3e3; outline: none; background: #f0f2f5; }
.search-row button { padding: 0 16px; border: none; background: #00a884; color: #fff; border-radius: 20px; cursor: pointer; }

/* Chat List */
.chat-list { flex: 1; overflow-y: auto; }
.chat-item { padding: 15px 20px; border-bottom: 1px solid #f8f9fa; cursor: pointer; display: flex; align-items: center; font-weight: 500; justify-content: space-between;}
.chat-item:hover { background: #f0f2f5; }

/* Chat Window */
.chat { flex: 1; display: flex; flex-direction: column; background: #efeae2; }
.chat-header { padding: 15px 20px; background: #f0f2f5; font-weight: 600; font-size: 16px; border-bottom: 1px solid #e3e3e3; }
.messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.message { max-width: 65%; padding: 10px 14px; border-radius: 10px; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
.me { align-self: flex-end; background: #d9fdd3; color: #111b21; border-top-right-radius: 2px; }
.other { align-self: flex-start; background: #fff; color: #111b21; border-top-left-radius: 2px; }
.msg-media { max-width: 280px; max-height: 200px; border-radius: 8px; display: block; margin-top: 4px; object-fit: cover; }

/* Input Bar */
.input { display: flex; gap: 10px; padding: 12px 20px; background: #f0f2f5; align-items: center; }
.input input[type=text] { flex: 1; padding: 12px 16px; border-radius: 24px; border: none; outline: none; font-size: 15px; }
.input button { width: 42px; height: 42px; border: none; border-radius: 50%; background: #00a884; color: #fff; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 16px; }
.clip-btn { background: transparent !important; color: #54656f !important; font-size: 20px !important; }
</style>
</head>

<body>

<div class="auth" id="authBox">
  <div class="auth-box">
    <h2>Mumin Messenger</h2>
    <div id="loginBox">
      <input id="loginEmail" type="email" placeholder="Email">
      <input id="loginPass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <p class="auth-toggle" onclick="toggleAuth(true)">Create account</p>
    </div>

    <div id="registerBox" style="display:none">
      <input id="regName" placeholder="Full Name">
      <input id="regUsername" placeholder="Username">
      <input id="regEmail" type="email" placeholder="Email">
      <input id="regPass" type="password" placeholder="Password">
      <button onclick="register()">Register</button>
      <p class="auth-toggle" onclick="toggleAuth(false)">Already have account</p>
    </div>
  </div>
</div>

<div class="app" id="appBox">
  <div class="sidebar">
    <div class="sidebar-header">
      <span id="me">Loading...</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="search-box">
      <div class="search-row">
        <input id="searchUser" placeholder="Username লিখুন...">
        <button onclick="startSingleChat()">Chat</button>
      </div>
    </div>

    <div class="chat-list" id="chatList"></div>
  </div>

  <div class="chat">
    <div class="chat-header" id="chatTitle">No chat selected</div>
    <div class="messages" id="messages"></div>
    <div class="input">
      <input type="file" id="media" accept="image/*,video/*" hidden onchange="sendMedia()">
      <button class="clip-btn" onclick="media.click()"><i class="fa fa-paperclip"></i></button>
      <input type="text" id="msg" placeholder="Type a message">
      <button onclick="sendMessage()"><i class="fa fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>
const firebaseConfig={
 apiKey:"AIzaSyBHV2ml0ph5AdICrtBOxP5d5TqwaDqMRBY",
 authDomain:"mumin-messenger.firebaseapp.com",
 projectId:"mumin-messenger",
 storageBucket:"mumin-messenger.appspot.com"
};
firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

let myUid="", myUsername="", chatId="", unsub=null;
let cachedUsers = {}; 

function toggleAuth(r){
 loginBox.style.display=r?"none":"block";
 registerBox.style.display=r?"block":"none";
}

function register(){
 const name=regName.value.trim();
 const username=regUsername.value.trim().toLowerCase();
 const email=regEmail.value.trim();
 const pass=regPass.value;

 if(!name||!username||!email||pass.length<6){
  alert("সব ঘর ঠিকভাবে পূরণ করুন (Password নূন্যতম ৬ অক্ষরের হতে হবে)");
  return;
 }

 auth.createUserWithEmailAndPassword(email, pass).then(u => {
   return db.collection("users").doc(u.user.uid).set({
    name: name, 
    username: username, 
    email: email, 
    uid: u.user.uid
   }).then(() => {
     alert("অ্যাকাউন্ট তৈরি সফল হয়েছে!");
     location.reload();
   });
 }).catch(err => {
   alert("Registration failed: " + err.message);
 });
}

function login(){
 const email = loginEmail.value.trim();
 const pass = loginPass.value;
 if(!email || !pass) { alert("সব ঘর পূরণ করুন"); return; }
 auth.signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
}

function logout(){ auth.signOut().then(()=>location.reload()); }

auth.onAuthStateChanged(u=>{
 if(u){
  authBox.style.display="none";
  appBox.style.display="flex";
  myUid = u.uid;

  db.collection("users").doc(u.uid).get().then(d=>{
   if(d.exists){
    myUsername=d.data().username;
    me.innerText="⚡ " + d.data().name + " (@" + myUsername + ")";
    loadChats();
   }
  });
 } else {
  authBox.style.display="flex";
  appBox.style.display="none";
 }
});

function startSingleChat(){
 const q=searchUser.value.trim().toLowerCase();
 if(!q||q===myUsername) return;

 db.collection("users").where("username","==",q).get().then(s=>{
  if(s.empty){alert("User not found");return;}

  const targetUser=s.docs.data();
  chatId=[myUid, targetUser.uid].sort().join("_");

  db.collection("chats").doc(chatId).set({
   chatId: chatId,
   users:[myUid, targetUser.uid],
   updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true}).then(()=> {
   openChat(chatId, targetUser.name);
   searchUser.value = "";
  });
 });
}

function loadChats(){
 db.collection("chats").where("users","array-contains",myUid)
 .onSnapshot(s=>{
  chatList.innerHTML="";
  s.forEach(d=>{
   const chat = d.data();
   const div=document.createElement("div");
   div.className="chat-item";
   
   const otherUid = chat.users.find(x => x !== myUid);
   getUserName(otherUid, (fullName) => {
      div.innerHTML = `<span>💬 ${fullName}</span>`;
   });
   div.onclick=()=>getUserName(otherUid, (fullName) => openChat(chat.chatId, fullName));
   
   chatList.appendChild(div);
  });
 });
}

function getUserName(uid, callback) {
  if(cachedUsers[uid]) { callback(cachedUsers[uid]); return; }
  db.collection("users").doc(uid).get().then(doc => {
    if(doc.exists) {
      cachedUsers[uid] = doc.data().name;
      callback(doc.data().name);
    } else { callback("Unknown User"); }
  });
}

function openChat(id, title){
 chatId=id;
 chatTitle.innerText=title;
 messages.innerHTML="";
 if(unsub)unsub();

 unsub=db.collection("chats").doc(id).collection("messages")
 .orderBy("time").onSnapshot(s=>{
  messages.innerHTML="";
  s.forEach(d=>{
   const m=d.data();
   const div=document.createElement("div");
   div.className="message "+(m.sender===myUid?"me":"other");

   if(m.type==="image")
    div.innerHTML=`<img src="${m.text}" class="msg-media" alt="Shared Image" onclick="window.open('${m.text}')">`;
   else if(m.type==="video")
    div.innerHTML=`<video src="${m.text}" controls class="msg-media"></video>`;
   else
    div.innerHTML=`${escapeHtml(m.text)}`;
    
   messages.appendChild(div);
   messages.scrollTop=messages.scrollHeight;
  });
 });
}

function sendMessage(){
 if(!msg.value.trim()||!chatId)return;
 const textData = msg.value.trim();
 msg.value=""; 

 db.collection("chats").doc(chatId).collection("messages").add({
  sender: myUid, 
  text: textData,
  type: "text",
  time: firebase.firestore.FieldValue.serverTimestamp()
 });
}

function sendMedia(){
 const f=media.files; 
 if(!f||!chatId)return;

 if(f.size > 20 * 1024 * 1024) { alert("নিরাপত্তাজনিত কারণে ২০ মেগাবাইটের বড় ফাইল আপলোড করা যাবে না।"); return; }
 
 const isVideo = f.type.startsWith("video");
 const type = isVideo ? "video" : "image";
 
 const tempDiv = document.createElement("div");
 tempDiv.className = "message me";
 tempDiv.innerText = "Uploading file... ⏳";
 messages.appendChild(tempDiv);
 messages.scrollTop=messages.scrollHeight;

 const fileRef = storage.ref(`media/${myUid}/${Date.now()}_${f.name}`);
 
 fileRef.put(f).then(snapshot => {
    return snapshot.ref.getDownloadURL();
 }).then(downloadURL => {
    tempDiv.remove();
    db.collection("chats").doc(chatId).collection("messages").add({
      sender: myUid,
      text: downloadURL, 
      type: type,
      time: firebase.firestore.FieldValue.serverTimestamp()
    });
 }).catch(err => {
    tempDiv.remove();
    alert("Upload failed: " + err.message);
 });

 media.value="";
}

function escapeHtml(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

document.getElementById("msg").addEventListener("keyup", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
