<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Mumin Messenger – Fixed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{margin:0;font-family:Segoe UI;background:#dadbd3;height:100vh;display:flex}
.auth-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#0b141a,#075e54);display:flex;align-items:center;justify-content:center}
.auth-box{background:#fff;width:100%;max-width:400px;padding:30px;border-radius:20px;text-align:center}
.auth-box input{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #ccc}
.auth-box button{width:100%;padding:12px;background:#25d366;color:#fff;border:none;border-radius:10px;font-weight:bold}
.main{display:none;width:100%}
.sidebar{width:350px;background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column}
.sidebar-header{padding:15px;background:#f0f2f5;font-weight:bold;display:flex;justify-content:space-between}
.chat-list{flex:1;overflow:auto}
.chat-item{padding:12px;border-bottom:1px solid #eee;cursor:pointer}
.chat-item:hover{background:#f5f6f6}
.chat-area{flex:1;display:flex;flex-direction:column;background:#efeae2}
.chat-header{padding:10px;background:#f0f2f5;font-weight:bold}
.chat-messages{flex:1;overflow:auto;padding:15px;display:flex;flex-direction:column;gap:8px}
.message{max-width:65%;padding:8px 12px;border-radius:8px}
.me{align-self:flex-end;background:#d9fdd3}
.other{align-self:flex-start;background:#fff}
.chat-input{display:flex;padding:10px;background:#f0f2f5;gap:8px}
.chat-input input{flex:1;padding:10px;border-radius:8px;border:none}
.chat-input button{background:#00a884;border:none;color:#fff;width:45px;border-radius:50%}
.msg-media{max-width:250px;border-radius:6px}
</style>
</head>

<body>

<!-- AUTH -->
<div class="auth-overlay" id="authBox">
  <div class="auth-box">
    <h2>Mumin Messenger</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p onclick="register()" style="cursor:pointer;color:#075e54">Create account</p>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="mainApp">
  <div class="sidebar">
    <div class="sidebar-header">
      <span id="meName"></span>
      <button onclick="logout()">Logout</button>
    </div>
    <div class="chat-list" id="chatList"></div>
  </div>

  <div class="chat-area">
    <div class="chat-header" id="chatTitle">Select a chat</div>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input">
      <input type="file" id="media" onchange="sendMedia()" hidden>
      <button onclick="media.click()"><i class="fa fa-paperclip"></i></button>
      <input id="msg" placeholder="Message">
      <button onclick="sendMessage()"><i class="fa fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
 apiKey:"AIzaSyBHV2ml0ph5AdICrtBOxP5d5TqwaDqMRBY",
 authDomain:"mumin-messenger.firebaseapp.com",
 projectId:"mumin-messenger"
};
firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

let me="",chatId="",unsub=null;

auth.onAuthStateChanged(u=>{
 if(u){
  document.getElementById("authBox").style.display="none";
  document.getElementById("mainApp").style.display="flex";
  me=u.email.split("@")[0];
  document.getElementById("meName").innerText=me;
  loadChats();
 }else{
  document.getElementById("authBox").style.display="flex";
 }
});

function register(){
 auth.createUserWithEmailAndPassword(email.value,password.value);
}

function login(){
 auth.signInWithEmailAndPassword(email.value,password.value);
}

function logout(){auth.signOut();}

function loadChats(){
 db.collection("chats").where("users","array-contains",me)
 .onSnapshot(s=>{
  chatList.innerHTML="";
  s.forEach(d=>{
   const p=d.data().users.find(u=>u!==me);
   const div=document.createElement("div");
   div.className="chat-item";
   div.innerText=p;
   div.onclick=()=>openChat(d.id,p);
   chatList.appendChild(div);
  });
 });
}

function openChat(id,partner){
 chatId=id;
 chatTitle.innerText=partner;
 messages.innerHTML="";
 if(unsub)unsub();
 unsub=db.collection("chats").doc(id).collection("messages")
 .orderBy("time").onSnapshot(s=>{
  messages.innerHTML="";
  s.forEach(d=>{
   const m=d.data();
   const div=document.createElement("div");
   div.className="message "+(m.sender===me?"me":"other");
   if(m.type==="image")div.innerHTML=`<img src="${m.text}" class="msg-media">`;
   else if(m.type==="video")div.innerHTML=`<video src="${m.text}" controls class="msg-media"></video>`;
   else div.innerText=m.text;
   messages.appendChild(div);
  });
  messages.scrollTop=messages.scrollHeight;
 });
}

function sendMessage(){
 if(!msg.value||!chatId)return;
 db.collection("chats").doc(chatId).collection("messages").add({
  sender:me,text:msg.value,type:"text",time:firebase.firestore.FieldValue.serverTimestamp()
 });
 msg.value="";
}

function sendMedia(){
 const f=media.files[0];
 if(!f||!chatId)return;
 const url=URL.createObjectURL(f);
 const type=f.type.startsWith("video")?"video":"image";
 db.collection("chats").doc(chatId).collection("messages").add({
  sender:me,text:url,type:type,time:firebase.firestore.FieldValue.serverTimestamp()
 });
 media.value="";
}
</script>

</body>
</html>
