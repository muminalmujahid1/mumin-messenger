<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤمن Messenger - WhatsApp Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', 'Hind Siliguri', sans-serif;
            display: flex;
            height: 100vh;
            background-color: #dadbd3;
            overflow: hidden;
        }
        
        /* প্রফেশনাল লগইন স্ক্রিন */
        .auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0b141a 0%, #075e54 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 35px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }
        .auth-logo {
            font-size: 50px;
            color: #25d366;
            margin-bottom: 10px;
        }
        .auth-container h2 { 
            color: #075e54; 
            margin-bottom: 5px;
            font-weight: 700;
        }
        .auth-container p {
            color: #667781;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-group {
            position: relative;
            margin-bottom: 15px;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #128c7e;
        }
        .auth-container input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 1.5px solid #e1e7ec;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
            background: #f8f9fa;
        }
        .auth-container input:focus {
            border-color: #25d366;
            background: #fff;
            box-shadow: 0 0 8px rgba(37, 211, 102, 0.2);
        }
        .auth-container button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            background-color: #25d366;
            color: white;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
            transition: 0.2s;
        }
        .auth-container button:hover {
            background-color: #20ba5a;
        }
        #recaptcha-container { 
            margin: 15px 0; 
            display: flex;
            justify-content: center;
        }

        /* মূল অ্যাপ্লিকেশন ইন্টারফেস */
        .main-app {
            display: none;
            width: 100%;
            height: 100vh;
            background-color: #f0f2f5;
        }
        
        /* বাম পাশের চ্যাট লিস্ট (Sidebar) */
        .sidebar {
            width: 380px;
            min-width: 340px;
            background-color: white;
            border-right: 1.5px solid #e9edef;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 12px 16px;
            background-color: #f0f2f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e9edef;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: #111b21;
        }
        .avatar-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #00a884;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }
        .logout-btn {
            font-size: 13px;
            padding: 8px 14px;
            background: #ffebee;
            color: #c62828;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .logout-btn:hover { background: #ffcdd2; }
        
        .search-box {
            padding: 8px 12px;
            background-color: #fff;
            border-bottom: 1px solid #e9edef;
            display: flex;
            gap: 8px;
        }
        .search-inner {
            position: relative;
            flex: 1;
        }
        .search-inner i {
            position: absolute;
            left: 12px; top: 50%;
            transform: translateY(-50%);
            color: #667781;
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 38px;
            border: none;
            background: #f0f2f5;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }
        .search-box button {
            background: #00a884;
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .chat-list {
            flex: 1;
            overflow-y: auto;
            background: #fff;
        }
        .chat-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f0f2f5;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.2s;
        }
        .chat-item:hover { background-color: #f5f6f6; }
        .chat-item.active { background-color: #eaebeb; }
        .chat-item-info {
            flex: 1;
        }
        .chat-item-name {
            font-weight: 600;
            color: #111b21;
            font-size: 16px;
            margin-bottom: 2px;
        }
        .chat-item-sub {
            font-size: 13px;
            color: #667781;
        }
        
        /* ডান পাশের চ্যাট এরিয়া */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #efeae2 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png') repeat;
        }
        .chat-header {
            background: #f0f2f5;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #e9edef;
        }
        .chat-header-info {
            flex: 1;
        }
        .chat-header-name {
            font-weight: 600;
            color: #111b21;
            font-size: 16px;
        }
        .chat-header-status {
            font-size: 12px;
            color: #667781;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px 5%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .message {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14.5px;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 1px 1px rgba(0,0,0,0.14);
            word-wrap: break-word;
        }
        .my-msg { 
            background-color: #d9fdd3; 
            align-self: flex-end; 
            border-top-right-radius: 0;
        }
        .other-msg { 
            background-color: white; 
            align-self: flex-start; 
            border-top-left-radius: 0;
        }
        
        /* মেসেজ ইনপুট বার */
        .chat-input-area {
            padding: 10px 16px;
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 11px 20px;
            border: none;
            background: #fff;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
        }
        .chat-input-area button {
            background-color: #00a884;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            transition: 0.2s;
        }
        .chat-input-area button:hover { background-color: #008f72; transform: scale(1.05); }

        /* নো চ্যাট সিলেক্টেড স্ক্রিন */
        .no-chat-selected {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #667781;
            flex-direction: column;
            background: #f8f9fa;
            border-bottom: 6px solid #43c651;
            text-align: center;
            padding: 20px;
        }
        .no-chat-selected i {
            font-size: 80px;
            color: #ced5d8;
            margin-bottom: 20px;
        }
        .no-chat-selected h3 {
            color: #41525d;
            font-weight: 400;
            margin-bottom: 10px;
            font-size: 28px;
        }
    </style>
</head>
<body>

    <div class="auth-overlay" id="authBox">
        <div class="auth-container">
            <div class="auth-logo"><i class="fab fa-whatsapp"></i></div>
            <h2>مؤمن Messenger</h2>
            <p>নিরাপদ ও রিয়েল-টাইম চ্যাটিং প্ল্যাটফর্ম</p>
            
            <div id="phoneInputSection">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="authName" placeholder="আপনার নাম লিখুন">
                </div>
                <div class="input-group">
                    <i class="fas fa-phone-alt"></i>
                    <input type="text" id="authPhone" placeholder="মোবাইল নম্বর (যেমন: +88017XXXXXXXX)">
                </div>
                <div id="recaptcha-container"></div>
                <button onclick="sendOTP()"><i class="fas fa-paper-plane"></i> ওটিপি কোড পাঠান</button>
            </div>

            <div id="otpInputSection" style="display: none;">
                <p style="color: #ef5350;"><i class="fas fa-shield-alt"></i> আপনার মোবাইলের ৬ ডিজিটের ওটিপি কোডটি দিন</p>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="text" id="authOTP" placeholder="৬ ডিজিটের কোড লিখুন">
                </div>
                <button onclick="verifyOTP()"><i class="fas fa-check-circle"></i> নিশ্চিত করে লগইন করুন</button>
            </div>
        </div>
    </div>

    <div class="main-app" id="appBox">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar-placeholder" id="userAvatar"><i class="fas fa-user"></i></div>
                    <span id="userDisplay">ব্যবহারকারী</span>
                </div>
                <button class="logout-btn" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> লগআউট</button>
            </div>
            <div class="search-box">
                <div class="search-inner">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchUserPhone" placeholder="বন্ধুর নম্বর দিয়ে খুঁজুন...">
                </div>
                <button onclick="startNewChat()">চ্যাট</button>
            </div>
            <div class="chat-list" id="activeChatsList"></div>
        </div>

        <div class="chat-area" id="chatAreaWindow" style="display: none;">
            <div class="chat-header">
                <div class="avatar-placeholder" style="background: #128c7e;"><i class="fas fa-comments"></i></div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="currentChatPartner">চ্যাট পার্টনার</div>
                    <div class="chat-header-status"><i class="fas fa-circle" style="color: #25d366; font-size: 9px;"></i> সুরক্ষিত চ্যাট এনভায়রনমেন্ট</div>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="msgInput" placeholder="এখানে মেসেজ লিখুন...">
                <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <div class="no-chat-selected" id="noChatPlaceholder">
            <i class="fab fa-whatsapp"></i>
            <h3>مؤمن ওয়েব মেসেঞ্জার</h3>
            <p>আপনার মোবাইল নম্বর দিয়ে কানেক্টেড বন্ধুদের সাথে চ্যাট শুরু করুন।<br>শুরু করতে বাম পাশের সার্চ বক্সে বন্ধুর নম্বর লিখুন।</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>

    <script>
        // ফায়ারবেস কনফিগুরেশন (আপনার পাঠানো টোকেন)
        const firebaseConfig = {
            apiKey: "Ae0iMNfnb3mKsZpbNSSZc51OQ51CnkPcN_kr7WE_pTq4RYwsi4KGJ7zasAadeQVH5htC_alZAlkab9qEEgmS2H3xfIUHI7VSPT2OtriuYaYt8Dg0_OCYbYspG8BfjM-ppPhBAOHc0SPrZcophncu_NCn",
            authDomain: "mumin-messenger.firebaseapp.com",
            projectId: "mumin-messenger",
            storageBucket: "mumin-messenger.firebasestorage.app",
            messagingSenderId: "315677520507",
            appId: "1:315677520507:web:704763268b428bf1a068de",
            measurementId: "G-CW1R9VR7CS"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUserPhone = "";
        let currentUserName = "";
        let activeChatId = null; 
        let confirmationResult = null;
        let unsubscribeMessages = null;

        window.onload = function() {
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                'size': 'normal'
            });
            window.recaptchaVerifier.render();
        };

        function sendOTP() {
            const name = document.getElementById('authName').value.trim();
            const phoneNumber = document.getElementById('authPhone').value.trim();
            
            if(!name || !phoneNumber) return alert("দয়া করে নাম এবং মোবাইল নম্বর সঠিক নিয়মে দিন।");
            currentUserName = name;

            const appVerifier = window.recaptchaVerifier;
            auth.signInWithPhoneNumber(phoneNumber, appVerifier)
                .then((result) => {
                    confirmationResult = result;
                    document.getElementById('phoneInputSection').style.display = 'none';
                    document.getElementById('otpInputSection').style.display = 'block';
                }).catch((error) => {
                    alert("ওটিপি পাঠাতে সমস্যা হয়েছে! " + error.message);
                    location.reload(); 
                });
        }

        function verifyOTP() {
            const code = document.getElementById('authOTP').value.trim();
            if(!code) return alert("৬ ডিজিটের কোডটি লিখুন।");

            confirmationResult.confirm(code).then((result) => {
                const user = result.user;
                currentUserPhone = user.phoneNumber;

                db.collection("users").doc(currentUserPhone).set({
                    name: currentUserName,
                    phone: currentUserPhone
                }).then(() => {
                    alert("লগইন সফল হয়েছে!");
                });

            }).catch((error) => alert("ভুল কোড দিয়েছেন! আবার চেষ্টা করুন।"));
        }

        function logoutUser() { 
            auth.signOut().then(() => {
                location.reload(); 
            });
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('appBox').style.display = 'flex';
                currentUserPhone = user.phoneNumber;
                
                db.collection("users").doc(currentUserPhone).get().then((doc) => {
                    if(doc.exists) {
                        currentUserName = doc.data().name;
                        document.getElementById('userDisplay').innerText = currentUserName;
                        if(currentUserName) {
                            document.getElementById('userAvatar').innerText = currentUserName.charAt(0).toUpperCase();
                        }
                    }
                    loadMyChatList();
                });
            } else {
                document.getElementById('authBox').style.display = 'flex';
                document.getElementById('appBox').style.display = 'none';
            }
        });

        function startNewChat() {
            const partnerPhone = document.getElementById('searchUserPhone').value.trim();
            if(!partnerPhone || partnerPhone === currentUserPhone) return alert("সঠিক মোবাইল নম্বর দিন। নিজের নম্বরে চ্যাট করা যাবে না।");

            db.collection("users").doc(partnerPhone).get().then((docSnap) => {
                if (!docSnap.exists) {
                    alert("এই নম্বরে কোনো অ্যাকাউন্ট খোলা নেই!");
                    return;
                }
                
                const partnerName = docSnap.data().name;
                const chatId = [currentUserPhone, partnerPhone].sort().join("_");
                
                db.collection("chats").doc(chatId).set({
                    users: [currentUserPhone, partnerPhone],
                    names: {
                        [currentUserPhone]: currentUserName,
                        [partnerPhone]: partnerName
                    },
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true }).then(() => {
                    document.getElementById('searchUserPhone').value = "";
                    openChat(chatId, partnerName, partnerPhone);
                });
            });
        }

        function loadMyChatList() {
            db.collection("chats")
                .where("users", "array-contains", currentUserPhone)
                .orderBy("lastUpdated", "desc") 
                .onSnapshot((snapshot) => {
                    const listContainer = document.getElementById('activeChatsList');
                    listContainer.innerHTML = "";
                    
                    snapshot.forEach((doc) => {
                        const chatData = doc.data();
                        const partnerPhone = chatData.users.find(u => u !== currentUserPhone);
                        const partnerName = chatData.names ? chatData.names[partnerPhone] : partnerPhone;
                        
                        const item = document.createElement('div');
                        item.classList.add('chat-item');
                        if (activeChatId === doc.id) item.classList.add('active');
                        
                        const firstLetter = partnerName ? partnerName.charAt(0).toUpperCase() : "💬";
                        
                        item.innerHTML = `
                            <div class="avatar-placeholder" style="background: #667781;">${firstLetter}</div>
                            <div class="chat-item-info">
                                <div class="chat-item-name">${partnerName}</div>
                                <div class="chat-item-sub">${partnerPhone}</div>
                            </div>
                        `;
                        
                        item.onclick = () => {
                            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
                            item.classList.add('active');
                            openChat(doc.id, partnerName, partnerPhone);
                        };
                        listContainer.appendChild(item);
                    });
                }, (error) => {
                    console.log("ইনডেক্সিং এরর ফিক্স না করা পর্যন্ত কনসোলে এরর দেখাতে পারে: ", error);
                });
        }

        function openChat(chatId, partnerName, partnerPhone) {
            activeChatId = chatId;
            document.getElementById('noChatPlaceholder').style.display = 'none';
            document.getElementById('chatAreaWindow').style.display = 'flex';
            document.getElementById('currentChatPartner').innerText = partnerName + ` (${partnerPhone})`;
            loadMessages(chatId);
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(text === "" || !activeChatId) return;

            db.collection("chats").doc(activeChatId).collection("messages").add({
                sender: currentUserPhone,
                text: text,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                db.collection("chats").doc(activeChatId).update({
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                });
            });

            input.value = "";
            input.focus();
        }

        function loadMessages(chatId) {
            if(unsubscribeMessages) unsubscribeMessages();

            unsubscribeMessages = db.collection("chats").doc(chatId).collection("messages")
                .orderBy("createdAt")
                .onSnapshot((snapshot) => {
                    const chatMessages = document.getElementById('chatMessages');
                    chatMessages.innerHTML = '';

                    snapshot.forEach((doc) => {
                        const msgData = doc.data();
                        const msgDiv = document.createElement('div');
                        msgDiv.classList.add('message');
                        
                        if(msgData.sender === currentUserPhone) {
                            msgDiv.classList.add('my-msg');
                        } else {
                            msgDiv.classList.add('other-msg');
                        }
                        
                        msgDiv.textContent = msgData.text;
                        chatMessages.appendChild(msgDiv);
                    });
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                });
        }

        document.getElementById('msgInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { sendMessage(); }
        });
    </script>
</body>
</html>
